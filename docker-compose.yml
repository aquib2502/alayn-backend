version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alayn-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alayn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alayn-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: development
    container_name: alayn-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/alayn_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=docker_secret_access_key_98765
      - JWT_REFRESH_SECRET=docker_secret_refresh_key_56789
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
